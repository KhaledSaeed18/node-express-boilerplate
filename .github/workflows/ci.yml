name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - dev

# Cancel any in-progress run for the same branch/PR so every new push to a PR doesn't queue behind the previous one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Format · Lint · Type-check · Build
    runs-on: ubuntu-latest

    # Prisma v7 reads DATABASE_URL from prisma.config.ts at generate time.
    # No real database is started — this value is never used to connect.
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Pin pnpm to the same version declared in package.json to avoid parser drift in CI.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.0
          run_install: false

      # Reads the version from .nvmrc. Caching is handled separately below to avoid
      # conflicts between pnpm/action-setup and setup-node's built-in corepack integration.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      # Cache the pnpm store manually so the key is always tied to the lockfile hash.
      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Generates src/generated/prisma from prisma/schema.prisma.
      # Must run before type-check so @prisma/client types are available.
      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Format check
        run: pnpm format:check

      - name: Lint check
        run: pnpm lint:check

      - name: Type check
        run: pnpm type:check

      - name: Build
        run: pnpm build
